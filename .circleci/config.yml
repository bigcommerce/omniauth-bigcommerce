version: 2.1

ruby_env: &ruby_env
  working_directory: ~/repo
  environment:
    BUNDLE_JOBS: 4
    BUNDLE_RETRY: 3
    BUNDLE_PATH: vendor/bundle
    RACK_ENV: test
    RAILS_ENV: test
    RUBY_VERSION: <<parameters.ruby-version>>
  docker:
    - image: cimg/ruby:<<parameters.ruby-version>>

gem_cache_key: &gem_cache_key
  gem_cache_key: "gem-cache-v2"

executors:
  ruby_3_3:
    <<: *ruby_env
    parameters:
      ruby-version:
        type: string
        default: "3.3"
  ruby_3_4:
    <<: *ruby_env
    parameters:
      ruby-version:
        type: string
        default: "3.4"
  ruby_4_0:
    <<: *ruby_env
    parameters:
      ruby-version:
        type: string
        default: "4.0"

commands:
  pre-setup:
    steps:
      - add_ssh_keys
      - checkout
  bundle-install:
    parameters:
      gem_cache_key:
        type: string
        default: "gem-cache-v2"
      grpc_ruby_build_procs:
        type: integer
        default: 4
    steps:
      - restore_cache:
          keys:
            - <<parameters.gem_cache_key>>-{{ arch }}-{{ .Branch }}-{{ checksum "omniauth-bigcommerce.gemspec" }}-{{checksum "Gemfile"}}
            - <<parameters.gem_cache_key>>-{{ arch }}-{{ .Branch }}
            - <<parameters.gem_cache_key>>
      - run:
          name: "bundle install"
          command: |
            bundle config set --local path 'vendor/bundle'
            bundle lock --add-platform x86_64-linux
            bundle check || bundle install
            bundle clean
      - save_cache:
          key: <<parameters.gem_cache_key>>-{{ arch }}-{{ .Branch }}-{{ checksum "omniauth-bigcommerce.gemspec" }}-{{checksum "Gemfile"}
          paths:
            - vendor/bundle
  rspec-unit:
    parameters:
      additional_args:
        type: string
        default: ""
      glob:
        type: string
        default: ""
    steps:
      - run: mkdir ~/rspec
      - run:
          name: "Run rspec tests"
          command: |
            TESTFILES=$(circleci tests glob "spec/**/*_spec.rb" | circleci tests split --split-by=timings)
            echo "Running: ${TESTFILES}"
            bundle exec rspec --format progress --format RspecJunitFormatter -o ~/rspec/rspec.xml <<parameters.additional_args>> -- ${TESTFILES}
          when: always
      - store_test_results:
          path: ~/rspec
  bundle-audit:
    parameters:
      additional_args:
        type: string
        default: ""
    steps:
      - run: bundle exec bundle audit update
      - run: bundle exec bundle audit
  rubocop:
    steps:
      - run: bundle exec rubocop -P

jobs:
  bundle-audit:
    executor: <<parameters.e>>
    parameters:
      e:
        type: executor
        default: "ruby_3_3"
    steps:
      - pre-setup
      - bundle-install:
          <<: *gem_cache_key
      - bundle-audit
  rubocop:
    executor: <<parameters.e>>
    parameters:
      e:
        type: executor
        default: "ruby_3_3"
    steps:
      - pre-setup
      - bundle-install:
          <<: *gem_cache_key
      - rubocop
  rspec-unit:
    executor: <<parameters.e>>
    parameters:
      e:
        type: executor
        default: "ruby_3_3"
    steps:
      - pre-setup
      - bundle-install:
          <<: *gem_cache_key
      - rspec-unit

workflows:
  version: 2
  ruby_3_3:
    jobs:
      - bundle-audit:
          name: "ruby-3_3-bundle_audit"
          e: "ruby_3_3"
      - rubocop:
          name: "ruby-3_3-rubocop"
          e: "ruby_3_3"
      - rspec-unit:
          name: "ruby-3_3-rspec"
          e: "ruby_3_3"
  ruby_3_4:
    jobs:
      - bundle-audit:
          name: "ruby-3_4-bundle_audit"
          e: "ruby_3_4"
      - rubocop:
          name: "ruby-3_4-rubocop"
          e: "ruby_3_4"
      - rspec-unit:
          name: "ruby-3_4-rspec"
          e: "ruby_3_4"
  ruby_4_0:
    jobs:
      - bundle-audit:
          name: "ruby-4_0-bundle_audit"
          e: "ruby_4_0"
      - rubocop:
          name: "ruby-4_0-rubocop"
          e: "ruby_4_0"
      - rspec-unit:
          name: "ruby-4_0-rspec"
          e: "ruby_4_0"
